name: Lint

on:
  pull_request:
    branches:
      - master
  workflow_call:

permissions:
  contents: read
  security-events: write

concurrency:
  group: lint-${{ github.ref }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          activate-environment: true
          cache-python: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pre-commit checks
        run: uv run lefthook run pre-commit --all-files --no-tty

      - name: Verify no files were modified
        run: git diff --exit-code

      - name: Run semgrep
        env:
          SEMGREP_RULES: auto
        run: >-
          uv run semgrep ci
          --exclude-rule=bash.lang.security.ifs-tampering.ifs-tampering
          --sarif-output=semgrep.sarif

      - name: Upload semgrep SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
