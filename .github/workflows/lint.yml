name: Lint

on:
  pull_request:
    branches:
      - master
  workflow_call:

permissions:
  contents: read
  security-events: write

concurrency:
  group: lint-${{ github.ref }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          activate-environment: true
          cache-python: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pre-commit checks
        run: uv run lefthook run pre-commit --all-files --no-tty

      - name: Verify no files were modified
        run: git diff --exit-code

      - name: Run semgrep
        env:
          SEMGREP_RULES: auto
        run: >-
          uv run semgrep ci
          --exclude-rule=bash.lang.security.ifs-tampering.ifs-tampering
          --sarif-output=semgrep.sarif

      - name: Upload semgrep SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
