name: Lint

on:
  pull_request:
    branches:
      - master
  workflow_call:

permissions:
  contents: read
  security-events: write

concurrency:
  group: lint-${{ github.ref }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          cache-python: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pre-commit checks
        run: uv run lefthook run pre-commit --all-files --no-tty

      - name: Verify no files were modified
        run: git diff --exit-code

      - name: Run semgrep
        env:
          SEMGREP_RULES: auto
        run: uv run semgrep ci --sarif-output=semgrep.sarif

      - name: Upload semgrep SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
