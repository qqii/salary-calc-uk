name: Publish Marimo Notebook

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read
      security-events: write

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          activate-environment: true
          cache-python: true

      - name: Inject commit hash into notebook links
        run: |
          COMMIT_HASH="$(git rev-parse HEAD)"
          sed -i "s|<COMMIT_HASH>|${COMMIT_HASH}|g" salary.nb.py
          if rg -q "<COMMIT_HASH>" salary.nb.py; then
            echo "ERROR: <COMMIT_HASH> placeholder still present after replacement."
            exit 1
          fi

      - name: Export notebook to WASM HTML
        run: |
          # TODO: build in edit mode and run mode, defaulting to run mode at the
          # root but having a link to switch to edit mode for users who want to
          # see the code and experiment with it
          mkdir -p site
          uv run marimo export html-wasm salary.nb.py \
            --mode run \
            --no-show-code \
            --output site/index.html \
            --force
          tree site/

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
